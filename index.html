<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MundialFIFA2026</title>

<style>
:root{ --bg:#0e0e6e; --card:#1c1c9c; --owned:#2ecc71; --dupe:#f39c12; --text:#fff; }
body{ margin:0; font-family: system-ui, Arial; background:var(--bg); color:var(--text); }
header{ padding:25px; text-align:center; font-size:20px; font-weight:bold; }

.topbar{ display:flex; flex-direction: column; gap:10px; padding:10px; position:sticky; top:0; background:var(--bg); z-index: 1; }
.topbar > div:first-child{ display:flex; gap:10px; align-items:center; }

input, select{ flex:1; padding:10px; border-radius:10px; border:none; width:50%; box-sizing:border-box; }

.controls{ display:flex; gap:10px; }
.controls button{ min-width:40px; width: 100%; height: 36px; }

.stats{ display:flex; justify-content:space-around; font-size:16px; padding:5px; }
.progress{ height:6px; background:#222; }
.progress div{ height:100%; background:#2ecc71; width:0%; }

.section{ padding:10px 0; border-bottom: 1px solid var(--card); }
.section h2{ font-size:14px; margin:10px 0; opacity:.9; display:flex; justify-content:space-between; align-items:center; gap:8px; }

.grid{ display:grid; grid-template-columns: repeat(auto-fill,minmax(60px,1fr)); gap:8px; }
.hidden{ display:none; }

.card{ background:var(--card); border-radius:12px; padding:12px; text-align:center; font-size:14px; }
.card.owned{ background:var(--owned); }
.card.dupe{ background:var(--dupe); }
.count{ font-size:12px; opacity:.8; }

.shareBar{ display:none; padding:10px; flex-wrap:wrap; gap:6px; }
#app { padding:0 10px;}
@media (max-width:768px){ .shareBar{ display:flex; } }

button{ border:none; border-radius:6px; padding:6px 8px; cursor:pointer; }
.small{ font-size:12px; opacity:.9; }
.small + button { width: 36px; height: 36px;}
</style>
</head>

<body>
<header>MundialFIFA2026</header>

<div class="topbar">
  <div>
    <input id="search" placeholder="Ej: COL 7">
    <select id="filter">
      <option value="all">Todas</option>
      <option value="missing">Faltantes</option>
      <option value="owned">Tengo</option>
      <option value="dupe">Repetidas</option>
    </select>
  </div>
  <div class="controls">
    <button onclick="toggleAllSmart()" id="toggleAllBtn">☰</button>
    <button onclick="toggleGlobalLock()" id="lockBtn">🔓</button>
    <button onclick="exportData()" title="Descargar backup">⬇️</button>
    <button onclick="document.getElementById('fileInput').click()" title="Subir backup">⬆️</button>
    <input type="file" id="fileInput" accept="application/json" style="display:none" />
  </div>
  <div class="stats">
    <div>Total: <span id="total"></span></div>
    <div>Tienes: <span id="owned"></span></div>
    <div>Faltan: <span id="missing"></span></div>
    <div>Repetidas: <span id="dupes"></span></div>
  </div>
  <div class="progress"><div id="bar"></div></div>
</div>

<div class="shareBar">
  <button onclick="shareCurrent()">Compartir</button>
</div>

<div id="app"></div>

<script>
const sections = {
  "FWC 🏆": ["00","1","2","3","4"],
  "FWC 🌎": ["5","6","7","8"],
  "FWC 📜": Array.from({length:11},(_,i)=> (i+9).toString()),
};

const teams = ["MEX","RSA","KOR","CZE","CAN","BIH","QAT","SUI","BRA","MAR","HAI","SCO","USA","PAR","AUS","TUR","GER","CUW","CIV","ECU","NED","JPN","SWE","TUN","BEL","EGY","IRN","NZL","ESP","CPV","KSA","URU","FRA","SEN","IRQ","NOR","ARG","ALG","AUT","JOR","POR","COD","UZB","COL","ENG","CRO","GHA","PAN"];
teams.forEach(t=>sections[t]=Array.from({length:20},(_,i)=>(i+1).toString()));
sections["CC 🥤"] = Array.from({length:14},(_,i)=>(i+1).toString());

let data = JSON.parse(localStorage.getItem("albumPro"))||{};
let collapsed = JSON.parse(localStorage.getItem("collapsedSections"))||{};
let globalLocked = JSON.parse(localStorage.getItem("globalLock"))||false;

const app = document.getElementById("app");

function pad(n){ return n.toString().padStart(2,'0'); }

function render(){
  app.innerHTML="";
  let total=0, owned=0, dupes=0;
  const filter = document.getElementById("filter").value;

  Object.entries(sections).forEach(([sec,nums])=>{
    const secDiv=document.createElement("div");
    secDiv.className="section";

    const title=document.createElement("h2");

    const left = document.createElement("span");
    left.innerText = sec;
    left.style.cursor='pointer';
    left.onclick=()=>{
      collapsed[sec]=!collapsed[sec];
      localStorage.setItem('collapsedSections',JSON.stringify(collapsed));
      render();
    };

    const right = document.createElement("div");
    right.style.display='flex';
    right.style.gap='6px';
    right.style.alignItems='center';

    let ownedSec = 0;

    nums.forEach(n=>{
      const key=sec+"-"+n;
      const c=data[key]||0;
      if(c>=1) ownedSec++;
    });

    const progress = document.createElement('span');
    progress.className='small';
    progress.innerText = `${pad(ownedSec)}/${pad(nums.length)}`;

    const resetBtn=document.createElement('button');
    resetBtn.innerText='-';
    resetBtn.onclick=(e)=>{
      e.stopPropagation();
      if(globalLocked) return;

      const c1 = confirm(`¿Borrar todas las figuritas de la sección ${sec}?`);
      if(!c1) return;

      nums.forEach(n=> delete data[sec+'-'+n]);
      save();
    };

    right.appendChild(progress);
    right.appendChild(resetBtn);

    title.appendChild(left);
    title.appendChild(right);
    secDiv.appendChild(title);

    const grid=document.createElement("div");
    grid.className="grid";

    if(collapsed[sec]) grid.classList.add('hidden');

    nums.forEach(n=>{
      total++;
      const key=sec+"-"+n;
      const c=data[key]||0;
      if(c>=1) owned++;
      if(c>1) dupes += (c-1);

      let show=true;
      if(filter==="missing" && c>0) show=false;
      if(filter==="owned" && c<1) show=false;
      if(filter==="dupe" && c<2) show=false;
      if(!show) return;

      const card=document.createElement("div");
      card.className="card";
      if(c===1) card.classList.add("owned");
      if(c>1) card.classList.add("dupe");

      const dupeCount = c>1 ? (c-1) : 0;
      card.innerHTML=`<div>${n}</div><div class='count'>${dupeCount}</div>`;

      if(globalLocked){
        card.style.opacity = 0.75;
        card.style.pointerEvents = 'none';
      }

      card.onclick=()=>{ if(!globalLocked){ data[key]=(c+1); save(); } };

      card.oncontextmenu=(e)=>{
        e.preventDefault();
        if(globalLocked) return;
        if(c>0) data[key]=c-1;
        if(data[key]<=0) delete data[key];
        save();
      };

      let timer;
      card.addEventListener('touchstart',()=>{
        timer=setTimeout(()=>{ if(!globalLocked){ delete data[key]; save(); } },300);
      });
      card.addEventListener('touchend',()=>clearTimeout(timer));
      card.addEventListener('touchmove',()=>clearTimeout(timer));

      grid.appendChild(card);
    });

    if(grid.children.length>0){
      secDiv.appendChild(grid);
      app.appendChild(secDiv);
    }
  });

  document.getElementById("total").innerText=total;
  document.getElementById("owned").innerText=owned;
  document.getElementById("missing").innerText=total-owned;
  document.getElementById("dupes").innerText=dupes;
  document.getElementById("bar").style.width=(owned/total*100)+"%";

  document.getElementById("lockBtn").innerText = globalLocked ? '🔒' : '🔓';
}

function toggleGlobalLock(){
  globalLocked = !globalLocked;
  localStorage.setItem("globalLock", JSON.stringify(globalLocked));
  render();
}

function toggleAllSmart(){
  const allCollapsed = Object.values(collapsed).every(v => v === true);

  if(allCollapsed){
    Object.keys(sections).forEach(sec=> collapsed[sec]=false);
  } else {
    Object.keys(sections).forEach(sec=> collapsed[sec]=true);
  }

  localStorage.setItem('collapsedSections',JSON.stringify(collapsed));
  render();
}

function save(){
  localStorage.setItem("albumPro",JSON.stringify(data));
  render();
}

function exportData(){
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "album-backup.json";
  a.click();
}

document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const imported = JSON.parse(evt.target.result);
      const ok = confirm('Esto reemplazará tu progreso actual. ¿Continuar?');
      if(!ok) return;
      data = imported;
      save();
    }catch(err){
      alert('Archivo inválido');
    }
  };
  reader.readAsText(file);
});

function buildShare(type){
  let grouped={};
  Object.entries(sections).forEach(([sec,nums])=>{
    nums.forEach(n=>{
      const key=sec+"-"+n;
      const c=data[key]||0;

      let include=false;
      if(type==='missing' && c===0) include=true;
      if(type==='owned' && c>=1) include=true;
      if(type==='dupe' && c>1) include=true;
      if(!include) return;

      if(!grouped[sec]) grouped[sec]=[];
      grouped[sec].push(c>1?`${n}(x${c-1})`:n);
    });
  });

  return Object.entries(grouped)
    .map(([sec,nums])=>`${sec}: ${nums.join(', ')}`)
    .join('\n');
}

function shareCurrent(){
  const type=document.getElementById("filter").value;
  if(type==='all'){ alert('Selecciona Faltantes, Tengo o Repetidas para compartir.'); return; }
  const labels={ missing:'Faltantes', owned:'Tengo', dupe:'Repetidas' };
  const header=`MundialFIFA2026 — ${labels[type]}\n\n`;
  const body=buildShare(type);
  const text=header+body;
  if(navigator.share){ navigator.share({title:'MundialFIFA2026',text}); }
  else{ navigator.clipboard.writeText(text); alert('Copiado al portapapeles'); }
}

document.getElementById("filter").onchange=render;

document.getElementById("search").addEventListener("change",e=>{
  const val=e.target.value.toLowerCase().split(" ");
  const el=[...document.querySelectorAll(".card")].find(c=>
    c.parentElement.parentElement.querySelector("h2 span").innerText.toLowerCase().includes(val[0]) &&
    c.innerText.includes(val[1]||"")
  );
  if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
});

render();
</script>

</body>
</html>
